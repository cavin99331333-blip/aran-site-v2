<!DOCTYPE html>
<html lang="ko" class="theme-dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>아란의원 - 프리미엄 재생의료 솔루션</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- PNG Export -->
  <script src="https://cdn.jsdelivr.net/npm/html-to-image@1.11.11/dist/html-to-image.js"></script>

  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-6RR2Q10SYZ"></script>
  <script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-6RR2Q10SYZ');
  </script>

  <style>
    /* ===================== RESET & BASE ===================== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root,
    html.theme-dark {
      --bg: #0A0A0A;
      --surface: #141414;
      --surface-2: #1e1e1e;
      --text: #EDEDED;
      --text-2: #888888;
      --accent: #6BD3D6;
      --accent-2: #8b5cf6;
      --border: rgba(255,255,255,0.08);
      --positive: #10b981;
      --negative: #f43f5e;
      --warning: #f59e0b;
      --svf-color: #00249C;
      --prp-color: #F93822;
      --button-teal: #6BD3D6;
      --button-navy: #000080;
      --feature-text: #222226;
    }

    html.theme-light {
      --bg: #FAFAF9;
      --surface: #FFFFFF;
      --surface-2: #f4f4f5;
      --text: #1a1a1a;
      --text-2: #666666;
      --accent: #6BD3D6;
      --accent-2: #7c3aed;
      --border: rgba(0,0,0,0.08);
      --positive: #059669;
      --negative: #e11d48;
      --warning: #d97706;
      --svf-color: #00249C;
      --prp-color: #F93822;
      --button-teal: #5AB9BC;
      --button-navy: #000080;
      --feature-text: #222226;
    }

    html, body {
      width: 100vw;
      height: 100vh;
      min-height: 100vh;
      font-family: 'Inter', 'Noto Sans KR', sans-serif;
      font-size: 16px;
      line-height: 1.6;
      background: var(--bg);
      color: var(--text);
      letter-spacing: -0.011em;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    /* ===================== TYPOGRAPHY ===================== */
    h1 { font-size: clamp(2rem, 5vw, 3.5rem); font-weight: 700; letter-spacing: -0.03em; line-height: 1.1; }
    h2 { font-size: clamp(1.5rem, 3vw, 2.5rem); font-weight: 600; letter-spacing: -0.02em; }
    h3 { font-size: clamp(1.1rem, 2vw, 1.5rem); font-weight: 600; }
    p  { color: var(--text-2); }

    /* ===================== FULLSCREEN SLIDE ===================== */
    main {
      width: 100vw;
      height: 100vh;
      position: relative;
      overflow: hidden;
    }

    .slide {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.6s ease;
      overflow: hidden;
    }

    .slide.active {
      opacity: 1;
      pointer-events: all;
    }

    .slide-content {
      width: 100%;
      height: 100%;
      padding: 40px 80px 140px 100px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      position: relative;
      overflow: hidden;
    }

    .slide.mfg-slide .slide-content {
      padding-top: 20px;
      padding-bottom: 140px;
      justify-content: flex-start;
    }

    /* ===================== GLASSMORPHISM ===================== */
    .glass-card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      padding: 40px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    .glass-card.svf {
      border-color: rgba(255, 193, 7, 0.2);
      box-shadow: 0 8px 32px rgba(255, 193, 7, 0.1);
    }

    .glass-card.prp {
      border-color: rgba(255, 68, 68, 0.2);
      box-shadow: 0 8px 32px rgba(255, 68, 68, 0.1);
    }

    /* ===================== HOME SLIDE ===================== */
    .home-hero {
      text-align: center;
      max-width: 800px;
    }

    .logo-container {
      margin-bottom: 40px;
      animation: slideDown 0.8s ease both;
      position: relative;
    }

    .logo-circle {
      width: 200px;
      height: 200px;
      margin: 0 auto;
      background: linear-gradient(135deg, rgba(107, 211, 214, 0.2), rgba(139, 92, 246, 0.1));
      border: 3px solid var(--accent);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 5rem;
      font-weight: 900;
      color: var(--accent);
      position: relative;
      box-shadow: 0 0 30px rgba(107, 211, 214, 0.3), inset 0 0 30px rgba(107, 211, 214, 0.1);
      animation: glow 3s ease-in-out infinite, scaleIn 1s ease-out both;
      letter-spacing: -0.05em;
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      cursor: pointer;
    }

    .logo-circle:hover {
      animation: rotateSway 0.8s ease-in-out infinite, glow 1.5s ease-in-out infinite, spin 2s linear infinite;
    }

    .logo-circle::before {
      content: '';
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border: 2px solid transparent;
      border-top-color: var(--accent);
      border-right-color: var(--accent);
      animation: spin 4s linear infinite;
      opacity: 0.3;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ===================== CLINIC NAME (2 lines) ===================== */
    .clinic-name {
      animation: fadeInUp 0.8s ease both 0.1s;
      margin-bottom: 50px;
      width: 100%;
    }

    .clinic-subtitle {
      font-size: 1rem;
      color: var(--text-2);
      font-weight: 500;
      margin-bottom: 8px;
      letter-spacing: 0.05em;
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      cursor: pointer;
    }

    .clinic-subtitle:hover {
      color: var(--accent);
      text-shadow: 0 0 20px rgba(107, 211, 214, 0.8), 0 0 40px rgba(107, 211, 214, 0.4);
      transform: scale(1.1);
    }

    .clinic-title {
      font-size: 2.2rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1.3;
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      cursor: pointer;
    }

    .clinic-title:hover {
      color: var(--accent);
      text-shadow: 0 0 30px rgba(107, 211, 214, 1), 0 0 60px rgba(107, 211, 214, 0.6);
      transform: scale(1.08) translateY(-2px);
    }

    /* ===================== CATEGORY BUTTONS (Large 3:4) ===================== */
    .button-group-large {
      display: flex;
      gap: 40px;
      justify-content: center;
      flex-wrap: wrap;
      animation: fadeInUp 0.8s ease both 0.2s;
      margin-bottom: 40px;
    }

    .btn-large {
      width: 220px;
      aspect-ratio: 3 / 4;
      padding: 32px 24px;
      border: 2px solid;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-weight: 600;
      font-size: 1.1rem;
      line-height: 1.4;
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(10px);
    }

    .btn-large-prp {
      border-color: var(--prp-color);
      color: var(--prp-color);
    }

    .btn-large-prp:hover {
      background: #F93822;
      color: white;
      box-shadow: 0 20px 80px rgba(249, 56, 34, 0.6), inset 0 0 30px rgba(255, 255, 255, 0.1);
      transform: translateY(-8px) scale(1.05);
      border-color: #F93822;
    }

    .btn-large-prp:active {
      transform: translateY(-2px) scale(0.98);
    }

    .btn-large-svf {
      border-color: var(--svf-color);
      color: var(--svf-color);
    }

    .btn-large-svf:hover {
      background: #00249C;
      color: white;
      box-shadow: 0 20px 80px rgba(0, 36, 156, 0.6), inset 0 0 30px rgba(255, 255, 255, 0.1);
      transform: translateY(-8px) scale(1.05);
      border-color: #00249C;
    }

    .btn-large-svf:active {
      transform: translateY(-2px) scale(0.98);
    }

    .btn-large-text-title {
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 16px;
    }

    .btn-large-text-desc {
      font-size: 0.95rem;
      font-weight: 500;
      opacity: 0.85;
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .btn-large-text-title {
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .btn-arrow {
      font-size: 1.5rem;
      margin-top: 8px;
      opacity: 0.5;
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .btn-large:hover .btn-large-text-title {
      transform: scale(1.15);
      color: white;
    }

    .btn-large:hover .btn-large-text-desc {
      transform: translateY(-4px);
      opacity: 1;
      color: white;
    }

    .btn-large:hover .btn-arrow {
      transform: translateX(8px);
      opacity: 1;
    }

    /* ===================== HOME BUTTON ===================== */
    .button-group-home {
      position: fixed;
      top: 24px;
      left: 24px;
      z-index: 500;
    }

    .btn-home {
      width: 100px;
      height: 100px;
      padding: 14px;
      border: 2px solid var(--accent);
      border-radius: 14px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-weight: 600;
      font-size: 0.8rem;
      line-height: 1.2;
      background: rgba(107, 211, 214, 0.08);
      backdrop-filter: blur(10px);
      color: var(--accent);
      gap: 4px;
    }

    .btn-home:hover {
      background: rgba(107, 211, 214, 0.15);
      color: #7DDEEE;
      box-shadow: 0 12px 40px rgba(107, 211, 214, 0.3);
      transform: translateY(-4px) scale(1.05);
    }

    .btn-home:active {
      transform: translateY(-2px) scale(0.98);
    }

    .btn-home-icon {
      font-size: 1.8rem;
    }

    .btn-home-text {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.05em;
    }

    /* ===================== INTRO SLIDE ===================== */
    .intro-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 60px;
      max-width: 1200px;
      animation: fadeInUp 0.8s ease both;
    }

    .intro-card {
      animation: slideInLeft 0.8s ease both;
    }

    .intro-card.prp-card {
      animation: slideInRight 0.8s ease both;
    }

    .intro-icon {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      margin-bottom: 24px;
      background: rgba(107, 211, 214, 0.1);
      border: 2px solid var(--accent);
    }

    .intro-card.svf .intro-icon {
      background: rgba(255, 193, 7, 0.15);
      border-color: var(--svf-color);
      color: var(--svf-color);
    }

    .intro-card.prp .intro-icon {
      background: rgba(255, 68, 68, 0.15);
      border-color: var(--prp-color);
      color: var(--prp-color);
    }

    .intro-title {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 16px;
    }

    .intro-text {
      font-size: 1.2rem;
      color: var(--text-2);
      line-height: 1.8;
    }

    /* ===================== ANIMATIONS ===================== */
    @keyframes floatUp {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
    }

    /* ===================== MANUFACTURER INTRO SLIDE ===================== */
    .mfg-intro-header {
      width: 100%;
      text-align: center;
      margin-bottom: 20px;
      animation: slideDown 0.8s ease both;
    }

    .mfg-intro-title {
      font-size: 2.2rem;
      margin-bottom: 8px;
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      cursor: pointer;
    }

    .mfg-intro-header:hover .mfg-intro-title {
      transform: scale(1.02);
      font-weight: 800;
      letter-spacing: 0.05em;
    }

    .mfg-intro-prp:hover .mfg-intro-title {
      color: var(--prp-color);
      text-shadow: 0 0 15px rgba(249, 56, 34, 0.8), 0 0 30px rgba(249, 56, 34, 0.5);
    }

    .mfg-intro-svf:hover .mfg-intro-title {
      color: var(--svf-color);
      text-shadow: 0 0 15px rgba(0, 36, 156, 0.8), 0 0 30px rgba(0, 36, 156, 0.5);
    }

    .mfg-intro-badge {
      display: none;
    }

    .badge-svf {
      background: rgba(255, 193, 7, 0.2);
      color: var(--svf-color);
      border: 1px solid var(--svf-color);
    }

    .badge-prp {
      background: rgba(255, 68, 68, 0.2);
      color: var(--prp-color);
      border: 1px solid var(--prp-color);
    }

    .mfg-cards-container {
      width: 100%;
      max-width: 1200px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      max-height: none;
      overflow: visible;
      padding-right: 60px;
      padding-left: 0;
    }

    .mfg-card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      border: 2px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 16px 20px;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      animation: fadeInUp 0.8s ease both;
      display: grid;
      grid-template-columns: 50px 150px 1.5fr 80px;
      grid-template-rows: auto auto auto;
      gap: 10px 16px;
      align-items: start;
    }

    .mfg-card:hover {
      background: rgba(255, 255, 255, 0.12);
      border-color: rgba(255, 255, 255, 0.3);
      box-shadow: 0 20px 60px rgba(107, 211, 214, 0.25);
      transform: translateY(-6px) scale(1.02);
    }

    .mfg-card:active {
      transform: translateY(-2px) scale(0.98);
    }

    .mfg-card.svf {
      border-color: rgba(0, 36, 156, 0.3);
    }

    .mfg-card.svf:hover {
      border-color: var(--svf-color);
      box-shadow: 0 12px 48px rgba(0, 36, 156, 0.2);
    }

    .mfg-card.prp {
      border-color: rgba(249, 56, 34, 0.3);
    }

    .mfg-card.prp:hover {
      border-color: var(--prp-color);
      box-shadow: 0 12px 48px rgba(249, 56, 34, 0.2);
    }

    .mfg-card-content {
      display: flex;
      align-items: center;
      gap: 24px;
      justify-content: space-between;
    }

    .mfg-card-icon {
      width: 50px;
      height: 50px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      background: rgba(255, 255, 255, 0.08);
      flex-shrink: 0;
      grid-row: 1 / 5;
      grid-column: 1;
    }

    .mfg-card-info {
      display: contents;
    }

    .mfg-card-name {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--text);
      white-space: nowrap;
      grid-row: 1;
      grid-column: 2;
      align-self: center;
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      cursor: pointer;
    }

    .mfg-card:hover .mfg-card-name {
      transform: scale(1.02);
      font-weight: 800;
      letter-spacing: 0.05em;
      text-shadow: 0 2px 8px rgba(255, 255, 255, 0.2);
    }

    .mfg-card-feature {
      font-size: 0.85rem;
      color: var(--text-2);
      line-height: 1.6;
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      white-space: normal;
      overflow: visible;
      grid-column: 3;
      text-align: left;
      font-weight: 500;
      min-height: 1.36rem;
      cursor: pointer;
    }

    .mfg-card:hover .mfg-card-feature {
      /* 특징 텍스트 호버 효과 없음 */
    }

    .mfg-feature-0 {
      grid-row: 1;
      animation-delay: 0s;
      font-size: 0.9rem;
      color: var(--text);
      font-weight: 600;
    }

    .mfg-feature-1 {
      grid-row: 2;
      animation-delay: 0.1s;
      font-size: 0.75rem;
      color: var(--text-2);
      font-weight: 400;
    }

    .mfg-feature-2 {
      grid-row: 3;
      animation-delay: 0.2s;
      font-size: 0.75rem;
      color: var(--text-2);
      font-weight: 400;
    }

    .mfg-card:hover .mfg-card-feature {
      /* 호버 효과 제거됨 */
    }

    .mfg-card-tagline {
      display: none;
    }

    .mfg-card-arrow {
      display: none;
    }

    .mfg-card {
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      cursor: pointer;
    }

    .mfg-card:hover {
      transform: translateY(-4px);
      border-color: rgba(255, 255, 255, 0.2);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3);
    }

    .mfg-card:hover .mfg-card-arrow {
      transform: translateX(8px);
      color: var(--accent);
    }

    /* ===================== MANUFACTURER SLIDE ===================== */
    .manufacturer-header {
      width: 100%;
      margin-bottom: 40px;
      animation: slideDown 0.8s ease both;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 40px;
    }

    .manufacturer-header-content {
      flex: 1;
      text-align: center;
    }

    .manufacturer-header-badge {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .manufacturer-title {
      font-size: 2.5rem;
      margin-bottom: 12px;
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      cursor: pointer;
    }

    .manufacturer-title:hover {
      font-weight: 800;
      text-shadow: 0 2px 8px rgba(255, 255, 255, 0.2);
      transform: scale(1.02);
    }

    .manufacturer-badge {
      display: inline-block;
      padding: 6px 16px;
      border-radius: 20px;
      font-weight: 600;
      font-size: 0.8rem;
      margin-top: 0;
      white-space: nowrap;
    }

    .mfg-card .manufacturer-badge {
      margin-top: 0;
      grid-row: 1;
      grid-column: 4;
      align-self: center;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .mfg-card .manufacturer-badge:hover {
      transform: scale(1.1);
      box-shadow: 0 0 20px rgba(0, 36, 156, 0.8), 0 0 40px rgba(0, 100, 200, 0.5);
      border-color: rgba(0, 36, 156, 0.8);
    }

    .manufacturer-feature-line {
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      cursor: pointer;
      padding: 6px 8px;
      border-radius: 6px;
      display: inline;
    }

    .manufacturer-feature-line:hover {
      font-weight: 800;
      text-shadow: 0 2px 8px rgba(255, 255, 255, 0.2);
      transform: scale(1.02);
    }

    .products-container {
      width: 100%;
      max-width: 1200px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 28px;
      max-height: 85vh;
      overflow-y: auto;
      padding-right: 20px;
      align-content: start;
    }

    .product-card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      border: 2px solid rgba(255, 255, 255, 0.25);
      border-radius: 16px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      animation: fadeInUp 0.8s ease both;
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      height: 540px;
      width: 100%;
    }

    .product-card:hover {
      background: rgba(255, 255, 255, 0.1);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      transform: translateY(-8px) scale(1.02);
    }

    .product-card.svf {
      border-color: rgba(0, 36, 156, 0.4);
    }

    .product-card.svf:hover {
      border-color: rgba(0, 36, 156, 0.6);
      box-shadow: 0 20px 60px rgba(0, 36, 156, 0.15);
    }

    .product-card.prp {
      border-color: rgba(249, 56, 34, 0.4);
    }

    .product-card.prp:hover {
      border-color: rgba(249, 56, 34, 0.6);
      box-shadow: 0 20px 60px rgba(249, 56, 34, 0.15);
    }

    .product-image-wrapper {
      width: 100%;
      height: 260px;
      background: rgba(255, 255, 255, 0.02);
      border-bottom: 1px solid rgba(255, 255, 255, 0.15);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

      to   { opacity: 1; transform: translateX(0); }

    // ===================== STATE MANAGEMENT =====================
    var currentSlide = 0;
    var slides = [];
    var themes = ['dark', 'light'];
    var currentTheme = 1;  // 0 = dark, 1 = light (밝은 모드를 기본값으로 설정)

    // ===================== INITIALIZE =====================
    function initializePresentation() {
      // 라이트모드를 기본값으로 강제 설정
      currentTheme = 1;
      document.documentElement.className = 'theme-light';

      generateSlides();
      renderAllSlides();
      showSlide(0);
      updateNavigation();
    }

    function generateSlides() {
      // Slide 0: Home
      slides.push({
        type: 'home',
        title: 'ARAN',
        subtitle: '프리미엄 재생의료 솔루션'
      });

      // Slide 1: PRP Manufacturers Intro
      slides.push({
        type: 'mfg-intro',
        category: 'PRP',
        manufacturers: productData.prp
      });

      // Slides 2-5: PRP Manufacturers
      productData.prp.forEach(function(mfg, index) {
        slides.push({
          type: 'manufacturer',
          category: 'PRP',
          name: mfg.name,
          tagline: mfg.tagline,
          icon: mfg.icon,
          description: mfg.description,
          products: mfg.products,
          manufacturerIndex: index
        });
      });

      // Slide 6: SVF Manufacturers Intro
      slides.push({
        type: 'mfg-intro',
        category: 'SVF',
        manufacturers: productData.svf
      });

      // Slides 7-11: SVF Manufacturers
      productData.svf.forEach(function(mfg, index) {
        slides.push({
          type: 'manufacturer',
          category: 'SVF',
          name: mfg.name,
          tagline: mfg.tagline,
          icon: mfg.icon,
          description: mfg.description,
          products: mfg.products,
          manufacturerIndex: index
        });
      });
    }

    function renderAllSlides() {
      var main = document.getElementById('main-content');
      main.innerHTML = '';

      slides.forEach(function(slide, index) {
        var slideEl = document.createElement('div');
        slideEl.className = 'slide' + (slide.type === 'manufacturer' ? ' mfg-slide' : '');
        slideEl.id = 'slide-' + index;

        if (slide.type === 'home') {
          slideEl.innerHTML = `
            <div class="slide-content">
              <div class="home-hero">
                <div class="logo-container">
                  <div class="logo-circle">ARAN</div>
                </div>
                <div class="clinic-name">
                  <div class="clinic-subtitle">하이엔드 프라이빗 피부과</div>
                  <div class="clinic-title">Aran Clinic(아란의원)</div>
                </div>
                <div class="button-group-large">

                    <div class="btn-large-text-desc">혈액에서 얻는 성장인자</div>
                    <div class="btn-arrow">→</div>
                  </button>
                  <button class="btn-large btn-large-svf" onclick="goToSVFIntroSlide()">
                    <div class="btn-large-text-title">SVF</div>
                    <div class="btn-large-text-desc">지방에서 얻는 재생세포</div>
                    <div class="btn-arrow">→</div>
                  </button>
                </div>
              </div>
            </div>
          `;
        } else if (slide.type === 'intro') {
          slideEl.innerHTML = `
            <div class="slide-content">
              <div class="intro-container">
                <div class="intro-card svf">
                  <div class="intro-icon">💚</div>
                  <h2 class="intro-title">SVF</h2>

                  <h2 class="intro-title">PRP</h2>
                  <p class="intro-text">혈액에서 얻는 성장 인자</p>
                </div>
              </div>
            </div>
          `;
        } else if (slide.type === 'mfg-intro') {
          var mfgCardsHTML = slide.manufacturers.map(function(mfg, mIdx) {
            var slideIndexForMfg = slide.category === 'PRP' ? (2 + mIdx) : (7 + mIdx);
            var featuresHTML = (mfg.features || []).map(function(feature, featureIdx) {
              return `<div class="mfg-card-feature mfg-feature-${featureIdx}" title="${feature}">• ${feature}</div>`;
            }).join('');
            return `
              <div class="mfg-card ${slide.category.toLowerCase()}" onclick="goToSlide(${slideIndexForMfg})" style="animation-delay:${mIdx * 0.1}s">
                <div class="mfg-card-icon">${mfg.icon}</div>
                <div class="mfg-card-info">
                  <div class="mfg-card-name">${mfg.name}</div>
                  ${featuresHTML}
                </div>
                <div class="manufacturer-badge badge-${slide.category.toLowerCase()}">
                  ${slide.category}${(slide.category === 'SVF' || slide.category === 'PRP') ? ' →' : ''}
                </div>
              </div>
            `;
          }).join('');

          slideEl.innerHTML = `
            <div class="slide-content">
              <div class="mfg-intro-header mfg-intro-${slide.category.toLowerCase()}">
                <h1 class="mfg-intro-title">${slide.category} 제조사</h1>

              </div>
              <div class="mfg-cards-container">
                ${mfgCardsHTML}
              </div>
            </div>
          `;
        } else if (slide.type === 'manufacturer') {
          var productsHTML = slide.products.map(function(product, pIdx) {
            var buttonColor = 'teal';
            var alternateButtonColor = 'red';

            return `
              <div class="product-card ${slide.category.toLowerCase()}" style="animation-delay:${pIdx * 0.1}s">
                <div class="product-image-wrapper">
                  ${product.image ? `<img src="${product.image}" alt="${product.title}" class="product-image" onerror="this.parentElement.style.background='rgba(255,255,255,0.05)'">` : ''}
                </div>

                  <div class="product-model">${product.modelName}</div>

                  <div class="product-price">₩ ${product.price}</div>
                  <div class="product-feature ${slide.category.toLowerCase()}">
                    ${product.feature}
                  </div>
                  <div class="product-buttons">
                    ${product.detail ? `<a href="${product.detail}" target="_blank" class="btn-action ${buttonColor}">상세페이지</a>` : ''}
                    ${product.video ? `<a href="${product.video}" target="_blank" class="btn-action ${alternateButtonColor}">▶영상보기</a>` : ''}
                  </div>
                </div>
              </div>
            `;
          }).join('');

          var descriptionHTML = '';
          if (slide.description && Array.isArray(slide.description)) {
            descriptionHTML = slide.description.map(function(desc) {
              return `<span class="manufacturer-feature-line">${desc}</span>`;
            }).join('<br>');
          } else {
            descriptionHTML = `
              <span class="manufacturer-feature-line">🌍 글로벌 시장에서 검증된 SVF 추출 자동화의 표준</span><br>
              <span class="manufacturer-feature-line">💪 대용량 처리 가능한 콤비네이션 시스템과 풍부한 임상 레퍼런스 보유</span><br>
              <span class="manufacturer-feature-line">🧬 지방 줄기세포 연구를 위한 다양한 라인업과 부대 장비 확보</span>
            `;
          }

          slideEl.innerHTML = `
            <div class="slide-content">
              <div class="manufacturer-header">
                <div class="manufacturer-header-content">
                  <h1 class="manufacturer-title">${slide.name}</h1>
                  <p style="margin-top:24px;font-size:1.1rem;color:var(--text-2);max-width:700px;margin-left:auto;margin-right:auto;line-height:1.6;">
                    ${descriptionHTML}
                  </p>
                </div>
                <div class="manufacturer-header-badge">
                  <div class="manufacturer-badge badge-${slide.category.toLowerCase()}">
                    ${slide.category}
                  </div>
                </div>
              </div>
              <div class="products-container">
                ${productsHTML}
              </div>
            </div>
          `;
        }

        main.appendChild(slideEl);
      });
    }

    // ===================== NAVIGATION =====================
    function showSlide(index) {
      if (index < 0 || index >= slides.length) return;

      document.querySelectorAll('.slide').forEach(function(el) {
        el.classList.remove('active');
      });

      currentSlide = index;
      document.getElementById('slide-' + index).classList.add('active');
      updateNavigation();
    }

    function nextSlide() {
      showSlide(currentSlide + 1);
    }

    function previousSlide() {
      showSlide(currentSlide - 1);
    }

    function goToSlide(index) {
      showSlide(index);
    }

    function goToPRPIntroSlide() {
      showSlide(1); // PRP intro slide (페이지 2)
    }

    function goToSVFIntroSlide() {
      showSlide(6); // SVF intro slide (페이지 7)
    }

    function updateNavigation() {
      document.getElementById('prevBtn').disabled = currentSlide === 0;
      document.getElementById('nextBtn').disabled = currentSlide === slides.length - 1;
      document.getElementById('pageIndicator').textContent = (currentSlide + 1) + ' / ' + slides.length;

      var progress = ((currentSlide + 1) / slides.length) * 100;
      document.getElementById('progressFill').style.width = progress + '%';
    }

    // ===================== THEME =====================
    function cycleTheme() {
      currentTheme = (currentTheme + 1) % themes.length;
      var theme = themes[currentTheme];
      document.documentElement.className = 'theme-' + theme;
      try { localStorage.setItem('theme', theme); } catch(e) {}
    }

    // Restore saved theme
    try {
      var saved = localStorage.getItem('theme');
      if (saved && themes.indexOf(saved) !== -1) {
        currentTheme = themes.indexOf(saved);
        document.documentElement.className = 'theme-' + saved;
      }
    } catch(e) {}

    // ===================== MENU =====================
    function toggleMenu() {
      var dropdown = document.getElementById('menuDropdown');
      dropdown.classList.toggle('open');
    }

    document.addEventListener('click', function(e) {
      var container = document.querySelector('.menu-container');
      if (container && !container.contains(e.target)) {
        document.getElementById('menuDropdown').classList.remove('open');
      }
    });

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') {
        document.getElementById('menuDropdown').classList.remove('open');
      }
    });

    // ===================== PNG DOWNLOAD =====================
    function downloadPNG() {
      var menu = document.querySelector('.menu-container');
      menu.style.display = 'none';
      htmlToImage.toPng(document.body, { pixelRatio: 2 })
        .then(function(dataUrl) {
          var link = document.createElement('a');
          link.download = 'aran-presentation.png';
          link.href = dataUrl;
          link.click();
        })
        .finally(function() {
          menu.style.display = '';
        });
    }

    // ===================== KEYBOARD NAVIGATION =====================
    document.addEventListener('keydown', function(e) {
      if (e.key === 'ArrowLeft') previousSlide();
      if (e.key === 'ArrowRight') nextSlide();
      if (e.key === 'Home') goToSlide(0);
      if (e.key === 'End') goToSlide(slides.length - 1);
    });

    // ===================== START =====================
    initializePresentation();
  </script>

</body>
</html>
